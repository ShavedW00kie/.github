name: Python Code Linter (Global)

# The 'workflow_call' trigger is the secret sauce. 
# It tells GitHub this workflow is designed to be called by other repositories.
on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install flake8
        run: pip install flake8
        
      - name: Run Linter
        run: flake8 .
